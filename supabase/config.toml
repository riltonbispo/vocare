project_id = "vocare"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback", "http://localhost:3000/auth/callback"]
enable_signup = true
enable_anonymous_sign_ins = true
enable_manual_linking = true

[auth.rate_limit]
# Limite conservador para desenvolvimento local. Configure o mesmo valor no
# Dashboard do projeto hospedado em Authentication > Rate Limits.
anonymous_users = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
